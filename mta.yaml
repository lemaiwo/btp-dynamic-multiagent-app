_schema-version: "3.1"
ID: pydantic-agent
description: Dynamic multi-agent Pydantic AI application for SAP BTP management
version: 2.1.0

parameters:
  enable-parallel-deployments: true

modules:
  - name: pydantic-agent
    type: python
    path: .
    build-parameters:
      builder: custom
      commands: []
      ignore:
        - ".venv/"
        - ".git/"
        - "__pycache__/"
        - "*.pyc"
        - ".env"
        - ".tokens.json"
        - ".tokens-*.json"
        - "agents_registry.db"
        - "mta_archives/"
        - "*.mtar"
        - "approuter/"
    parameters:
      memory: 1G
      disk-quota: 2G
      buildpack: python_buildpack
      command: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    properties:
      AICORE_RESOURCE_GROUP: "default"
      # Optional: restrict the set of MCP URLs admins can register.
      # Comma-separated list of URL prefixes. If empty, any BTP URL is allowed.
      MCP_URL_ALLOWLIST: ""
      # A2A / Joule integration — the public approuter URL of this app.
      # Joule fetches the agent card from this URL; the card's `url`
      # field is derived from it, so it MUST match the approuter host.
      # Example: https://<org>-<space>-pydantic-agent-approuter.cfapps.eu20-001.hana.ondemand.com
      A2A_PUBLIC_URL: ""
      A2A_AGENT_NAME: "SAP BTP Multi-Agent Orchestrator"
      A2A_AGENT_DESCRIPTION: "Dynamic multi-agent orchestrator for SAP BTP. Delegates to specialist agents backed by BTP-hosted MCP servers."
    requires:
      - name: aicore-service
      - name: uaa-service
      - name: agent-registry-db
    provides:
      - name: pydantic-agent-api
        properties:
          url: ${default-url}

  - name: pydantic-agent-approuter
    type: nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
      buildpack: nodejs_buildpack
    requires:
      - name: uaa-service
      - name: pydantic-agent-api
        group: destinations
        properties:
          name: pydantic-agent-backend
          url: ~{url}
          forwardAuthToken: true

resources:
  - name: aicore-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: aicore
      service-plan: extended

  - name: uaa-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
      config:
        xsappname: pydantic-agent-${space}

  - name: agent-registry-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: standard
