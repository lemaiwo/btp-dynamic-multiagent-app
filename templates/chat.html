<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/sap.png" />
    <link rel="shortcut icon" href="/static/sap.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP BTP Multi-Agent</title>
    <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/@pydantic/ai-chat-ui@1.0.0/dist/assets/index-Dtnbv4I1.js"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/npm/@pydantic/ai-chat-ui@1.0.0/dist/assets/index-BtNS_N-J.css">
    <script>
      // The chat UI is a React SPA rendered after load. Rebrand by watching
      // for the title <h1> and swapping its logo + text.
      (function () {
        const LOGO_URL = "/static/sap.png";
        const APP_NAME = "SAP BTP Multi-Agent";
        function rebrand() {
          document.querySelectorAll("h1 > span").forEach((span) => {
            if (span.textContent.trim() === "Pydantic AI") {
              span.textContent = APP_NAME;
            }
          });
          document.querySelectorAll("h1 > img").forEach((img) => {
            if (img.getAttribute("src") !== LOGO_URL) {
              img.setAttribute("src", LOGO_URL);
            }
          });
        }
        new MutationObserver(rebrand).observe(document.documentElement, {
          childList: true,
          subtree: true,
        });
        rebrand();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
