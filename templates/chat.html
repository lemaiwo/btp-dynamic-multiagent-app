    <link rel="shortcut icon" href="/static/favicon.ico" />

    <title>SAP BTP Multi-Agent</title>
    <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/@pydantic/ai-chat-ui@1.0.0/dist/assets/index-Dtnbv4I1.js"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/npm/@pydantic/ai-chat-ui@1.0.0/dist/assets/index-BtNS_N-J.css">
    <style>
      /* Swap the pydantic logo for our own. The UI uses an <img> with the
         pydantic logo in the top-left; we hide the original and paint a
         background image onto its container. Adjust the selector if the
         chat UI upgrades and the DOM changes. */
      header img[alt*="Pydantic" i],
      header img[src*="pydantic" i] {
        content: url("/static/logo.svg");
        max-height: 28px;
        width: auto;
      }
    </style>
  </head>

    <div id="root"></div>
  </body>
